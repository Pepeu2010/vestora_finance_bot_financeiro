<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="Bot Financeiro, um assistente de educacao financeira com IA.">
    <title>Bot Financeiro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=33">
    <link rel="manifest" href="/manifest.json?v=33">
    <link rel="stylesheet" href="/style.css?v=33">
    <script>
      window.va = window.va || function () {
        (window.vaq = window.vaq || []).push(arguments);
      };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="grid-layer"></div>
      <div class="scan-layer"></div>
      <div class="signal signal-a"></div>
      <div class="signal signal-b"></div>
    </div>

    <section class="auth-screen" id="authScreen" aria-label="Login do Bot Financeiro" hidden>
      <form class="auth-card" id="authForm">
        <div class="brand auth-brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="/icon.svg?v=24" alt="">
          </div>
          <div>
            <h1>Bot Financeiro</h1>
            <p>Entre para continuar seu planejamento</p>
          </div>
        </div>

        <input id="authName" name="name" type="text" placeholder="Nome" autocomplete="name">
        <input id="authEmail" name="email" type="email" placeholder="Email" autocomplete="email" required>
        <input id="authPassword" name="password" type="password" placeholder="Senha" autocomplete="current-password" required minlength="6">
        <p class="auth-error" id="authError" role="alert"></p>
        <button id="authSubmit" type="submit">Entrar</button>
        <button class="auth-toggle" id="authToggle" type="button">Criar conta</button>
      </form>
    </section>

    <main class="app-shell">
      <aside class="sidebar" aria-label="Painel do Bot Financeiro">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="/icon.svg?v=24" alt="">
          </div>
          <div>
            <h1>Bot Financeiro</h1>
            <p>Consultor de educação financeira</p>
          </div>
        </div>

        <section class="insight-panel" aria-label="Visao financeira">
          <div>
            <span>Foco atual</span>
            <strong>Clareza financeira</strong>
          </div>
          <div class="meter" aria-hidden="true">
            <span></span>
          </div>
        </section>

        <section class="summary" aria-label="Temas principais">
          <button type="button" data-prompt="Quero comprar um im&oacute;vel. Quais dados voc&ecirc; precisa para me orientar?">Comprar im&oacute;vel</button>
          <button type="button" data-prompt="Quero vender um im&oacute;vel. Como definir pre&ccedil;o, preparar an&uacute;ncio e negociar?">Vender im&oacute;vel</button>
          <button type="button" data-prompt="Quero simular um financiamento imobili&aacute;rio. Minha renda &eacute; R$ , entrada R$ , valor do im&oacute;vel R$ .">Financiamento</button>
          <button type="button" data-prompt="Quero investir melhor. Minha renda &eacute; R$ , gastos R$ , objetivo e prazo s&atilde;o .">Investir melhor</button>
          <button type="button" data-prompt="Quero sair das d&iacute;vidas. Tenho d&iacute;vidas de R$ , juros aproximados de  ao m&ecirc;s e renda de R$ .">Sair das d&iacute;vidas</button>
          <button type="button" data-prompt="Quero montar uma reserva de emerg&ecirc;ncia. Meus gastos mensais s&atilde;o R$ .">Montar reserva</button>
        </section>

        <section class="history-panel" aria-label="Histórico de conversas">
          <div class="history-head">
            <span>Conversas</span>
          </div>
          <div class="conversation-list" id="conversationList"></div>
        </section>

        <button class="new-chat" id="newChatButton" type="button">
          Nova conversa
        </button>
      </aside>

      <section class="chat-panel" aria-label="Conversa com o Bot Financeiro">
        <header class="chat-header">
          <div>
            <strong>Bot Financeiro</strong>
            <span id="statusText">Online</span>
          </div>
          <div class="live-pill" aria-hidden="true">
            <span></span>
            IA ativa
          </div>
          <button class="logout-button" id="logoutButton" type="button">Sair</button>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <textarea
            id="messageInput"
            name="message"
            rows="1"
            maxlength="1200"
            placeholder="Pergunte sobre investimentos, dívidas, reserva ou organização financeira..."
            autocomplete="off"
          ></textarea>
          <button id="sendButton" type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <script src="/app.js?v=33"></script>
  </body>
</html>
